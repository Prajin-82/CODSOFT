<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Calc Web - A beautiful, modern, glassmorphic calculator with a separate history panel and keyboard support.">
    <title>Calc Web</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-theme">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="app-container">
        <div class="calculator-card" id="calculator">
            <header class="calc-header">
                <div class="brand">
                    <span>Calc</span>
                </div>
            </header>

            <section class="display-container" aria-label="Calculator display">
                <div class="expr-line-wrapper">
                    <span id="display-expr" class="expr-text"></span>
                </div>
                <div class="input-line-wrapper">
                    <span id="display-input" class="input-text">0</span>
                </div>
            </section>

            <section class="keypad-container" aria-label="Calculator keys">
                <button class="calc-key control-key" data-key="Escape" data-action="clear"
                    title="All Clear (ESC)">AC</button>
                <button class="calc-key control-key" data-key="Backspace" data-action="delete"
                    title="Backspace">⌫</button>
                <button class="calc-key control-key" data-key="%" data-action="operator" title="Percentage">%</button>
                <button class="calc-key operator-key" data-key="/" data-action="operator"
                    title="Divide (/)">&divide;</button>

                <button class="calc-key num-key" data-key="7" data-action="digit">7</button>
                <button class="calc-key num-key" data-key="8" data-action="digit">8</button>
                <button class="calc-key num-key" data-key="9" data-action="digit">9</button>
                <button class="calc-key operator-key" data-key="*" data-action="operator"
                    title="Multiply (*)">&times;</button>

                <button class="calc-key num-key" data-key="4" data-action="digit">4</button>
                <button class="calc-key num-key" data-key="5" data-action="digit">5</button>
                <button class="calc-key num-key" data-key="6" data-action="digit">6</button>
                <button class="calc-key operator-key" data-key="-" data-action="operator"
                    title="Subtract (-)">-</button>

                <button class="calc-key num-key" data-key="1" data-action="digit">1</button>
                <button class="calc-key num-key" data-key="2" data-action="digit">2</button>
                <button class="calc-key num-key" data-key="3" data-action="digit">3</button>
                <button class="calc-key operator-key" data-key="+" data-action="operator" title="Add (+)">+</button>

                <button class="calc-key num-key" data-key="negate" data-action="negate"
                    title="Toggle Sign">&plusmn;</button>
                <button class="calc-key num-key zero-btn" data-key="0" data-action="digit">0</button>
                <button class="calc-key num-key" data-key="." data-action="decimal">.</button>
                <button class="calc-key equals-key" data-key="Enter" data-action="equals"
                    title="Calculate (Enter)">=</button>
            </section>
        </div>

        <aside class="history-card" id="history-card-panel">
            <header class="history-header">
                <h3>History Log</h3>
                <button class="clear-history-btn" id="clear-history-btn" title="Clear All History">Clear</button>
            </header>
            <div class="history-list" id="history-list">
                <div class="history-empty">No calculations yet</div>
            </div>
        </aside>
    </main>

    <!-- External Script -->
    <script src="script.js"></script>
</body>

</html>
